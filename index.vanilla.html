<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 Cat Meme Generator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #0f3460;
      --accent: #e040fb;
      --accent-hover: #ea80fc;
      --orange: #ff6f00;
      --orange-hover: #ff9100;
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --border: #2a2a4a;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #16213e, #1a1a2e);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }
    header h1 .emoji { -webkit-text-fill-color: initial; }
    .badge {
      font-size: 0.7rem;
      background: var(--bg-input);
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* INPUT & BOTONES PRINCIPALES */
    .hero {
      padding: 24px 0 16px;
    }
    .hero .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .input-row input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input[type="text"]:focus { border-color: var(--accent); }
    .input-row input[type="text"]::placeholder { color: var(--text-muted); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 4px 20px rgba(224,64,251,0.3); }
    .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: #1a4a7a; }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover:not(:disabled) { background: var(--orange-hover); box-shadow: 0 4px 20px rgba(255,111,0,0.3); }
    .btn-small { padding: 8px 14px; font-size: 0.8rem; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    /* MAIN LAYOUT */
    .main-content {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
      padding-bottom: 24px;
      flex: 1;
    }

    /* PANEL DE OPCIONES */
    .panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky;
      top: 110px;
      align-self: start;
    }
    .panel h3 {
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .panel-group { margin-bottom: 16px; }
    .panel-group:last-child { margin-bottom: 0; }
    .panel-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .panel-group input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      background: transparent;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .range-value {
      min-width: 30px;
      text-align: center;
      font-weight: 700;
      color: var(--accent);
      font-size: 0.9rem;
    }
    .panel-group input[type="color"] {
      width: 100%;
      height: 40px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      padding: 2px;
    }
    .panel-group select, .panel-group input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font);
      outline: none;
    }
    .panel-group select:focus, .panel-group input[type="number"]:focus { border-color: var(--accent); }

    /* TAGS */
    .tags-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.8rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag-chip:hover { border-color: var(--accent); color: var(--accent); }
    .tag-chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* IMAGEN DISPLAY */
    .display-area {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .display-area img {
      max-width: 100%;
      max-height: 500px;
      border-radius: 10px;
      animation: fadeIn 0.4s ease;
    }
    .placeholder {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .placeholder .cat-art {
      font-size: 4rem;
      margin-bottom: 12px;
      display: block;
      opacity: 0.5;
    }
    .placeholder p { margin-top: 8px; }

    .error-state {
      text-align: center;
      padding: 40px 20px;
    }
    .error-state .emoji-big { font-size: 3rem; display: block; margin-bottom: 12px; }
    .error-state p { color: var(--text-muted); font-size: 1rem; }

    /* SPINNER */
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      position: absolute;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ACCIONES DEBAJO DE LA IMAGEN */
    .image-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .url-display {
      width: 100%;
      margin-top: 10px;
    }
    .url-display code {
      display: block;
      font-size: 0.7rem;
      background: var(--bg);
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text-muted);
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }
    .feedback-copied {
      color: #4caf50;
      font-size: 0.85rem;
      font-weight: 600;
      animation: fadeIn 0.2s ease;
    }

    /* GALERÍA */
    .gallery-section {
      padding-bottom: 40px;
    }
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .gallery-header h3 {
      font-size: 1rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .gallery-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .gallery-item:hover { transform: scale(1.03); }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .gallery-item .overlay .btn { font-size: 0.75rem; padding: 6px 14px; }
    .gallery-empty {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
      grid-column: 1 / -1;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: auto;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ANIMACIONES */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }
      .panel {
        position: static;
      }
      header h1 { font-size: 1.2rem; }
      .btn { padding: 10px 18px; font-size: 0.85rem; }
      .display-area { min-height: 300px; }
      .gallery-grid { grid-template-columns: repeat(3, 1fr); min-height: 0; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .hero .input-row { flex-direction: column; }
      .input-row input[type="text"] { min-width: 0; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="container">
      <h1><span class="emoji">🐱</span> Cat Meme Generator</h1>
      <span class="badge">modo oscuro ON</span>
    </div>
  </header>

  <!-- HERO: INPUT + BTN -->
  <section class="hero">
    <div class="container">
      <div class="input-row">
        <input type="text" id="textInput" placeholder="Escribe tu texto aquí..." autofocus>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnGenerate">✨ Generar Meme</button>
        <button class="btn btn-secondary" id="btnNewCat">🎲 Nuevo Gato</button>
        <button class="btn btn-orange" id="btnSurprise">🎲 ¡Sorpréndeme!</button>
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="container main-content">

    <!-- PANEL -->
    <aside class="panel" id="optionsPanel">
      <h3>🎨 Personalizar</h3>

      <div class="panel-group">
        <label for="fontSize">Tamaño de fuente</label>
        <div class="range-row">
          <input type="range" id="fontSize" min="10" max="80" value="30">
          <span class="range-value" id="fontSizeValue">30</span>
        </div>
      </div>

      <div class="panel-group">
        <label for="fontColor">Color del texto</label>
        <input type="color" id="fontColor" value="#ffffff">
      </div>

      <div class="panel-group">
        <label for="imageType">Tipo de imagen</label>
        <select id="imageType">
          <option value="">— (sin tipo)</option>
          <option value="xsmall">xsmall</option>
          <option value="small">small</option>
          <option value="medium">medium</option>
          <option value="square">square</option>
        </select>
      </div>

      <div class="panel-group">
        <label for="imageFilter">Filtro</label>
        <select id="imageFilter">
          <option value="">— (sin filtro)</option>
          <option value="blur">blur</option>
          <option value="mono">mono</option>
          <option value="negate">negate</option>
        </select>
      </div>

      <div class="panel-group">
        <label for="imageWidth">Ancho (px)</label>
        <input type="number" id="imageWidth" placeholder="auto" min="0">
      </div>

      <div class="panel-group">
        <label>Tags (máx. 2)</label>
        <div class="tags-grid" id="tagsContainer"></div>
      </div>
    </aside>

    <!-- DISPLAY -->
    <section>
      <div class="display-area" id="displayArea">
        <div class="placeholder" id="placeholder">
          <span class="cat-art">🐱</span>
          <p>Tu meme aparecerá aquí</p>
        </div>
        <img id="memeImage" style="display:none" alt="Cat meme">
        <div class="spinner" id="spinner" style="display:none"></div>
        <div class="error-state" id="errorState" style="display:none">
          <span class="emoji-big">😴</span>
          <p>¡El gato se fue a dormir! Intenta de nuevo.</p>
        </div>
      </div>

      <div class="image-actions">
        <button class="btn btn-small btn-outline" id="btnCopyUrl">📋 Copiar URL</button>
        <button class="btn btn-small btn-secondary" id="btnDownload">⬇️ Descargar</button>
        <span id="copyFeedback" style="display:none"></span>
      </div>

      <div class="url-display">
        <code id="urlDisplay">—</code>
      </div>
    </section>

  </main>

  <!-- GALERÍA -->
  <section class="container gallery-section">
    <div class="gallery-header">
      <h3>🖼️ Memes recientes</h3>
      <button class="btn btn-small btn-outline" id="btnClearGallery">🗑️ Limpiar</button>
    </div>
    <div class="gallery-grid" id="galleryGrid">
      <div class="gallery-empty">Aún no hay memes generados.</div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    Powered by <a href="https://cataas.com" target="_blank" rel="noopener">cataas.com API</a> ❤️
  </footer>

  <script>
    // === ESTADO DE LA APP ===
    const TAGS = ['cute', 'orange', 'funny', 'sleeping', 'angry', 'happy', 'gif', 'kitten', 'fluffy', 'tabby'];
    const SURPRISE_PHRASES = [
      "Mondays? I don't do Mondays.",
      "I didn't choose the nap life, the nap life chose me.",
      "You were saying?",
      "I knead you",
      "404: Motivation not found",
      "Please. I'm busy doing nothing.",
      "Touch the belly. I dare you.",
      "Not my problem.",
      "Have you tried turning it off and on again?",
      "The audacity.",
      "I am speed. (and naps)",
      "This meeting could have been an email.",
      "Loading... still loading...",
      "Sir, this is a Wendy's.",
      "Just five more minutes.",
      "Error: Too many humans nearby.",
      "ctrl + Z my whole life please"
    ];

    const state = {
      text: 'Hello, Internet',
      tags: [],
      fontSize: 30,
      fontColor: '#ffffff',
      type: '',
      filter: '',
      width: '',
      gallery: [],
      currentUrl: '',
      isGenerating: false,
      hasGifTag: false,
    };

    // === REFS ===
    const $ = id => document.getElementById(id);
    const textInput = $('textInput');
    const btnGenerate = $('btnGenerate');
    const btnNewCat = $('btnNewCat');
    const btnSurprise = $('btnSurprise');
    const btnCopyUrl = $('btnCopyUrl');
    const btnDownload = $('btnDownload');
    const btnClearGallery = $('btnClearGallery');
    const displayArea = $('displayArea');
    const memeImage = $('memeImage');
    const spinner = $('spinner');
    const placeholder = $('placeholder');
    const errorState = $('errorState');
    const urlDisplay = $('urlDisplay');
    const copyFeedback = $('copyFeedback');
    const galleryGrid = $('galleryGrid');
    const tagsContainer = $('tagsContainer');
    const fontSizeSlider = $('fontSize');
    const fontSizeValue = $('fontSizeValue');
    const fontColorInput = $('fontColor');
    const imageType = $('imageType');
    const imageFilter = $('imageFilter');
    const imageWidth = $('imageWidth');

    // === FUNCIÓN buildUrl() ===
    function buildUrl({ text, tags, fontSize, fontColor, type, filter, width, noCache } = {}) {
      let url = 'https://cataas.com/cat';

      if (tags && tags.length > 0) {
        url += '/' + tags.join(',');
      }

      if (text && text.trim()) {
        url += '/says/' + encodeURIComponent(text.trim());
      }

      const params = new URLSearchParams();
      if (fontSize && fontSize != 30) params.set('fontSize', fontSize);
      if (fontColor && fontColor !== '#ffffff') params.set('fontColor', fontColor.replace('#', ''));
      if (type) params.set('type', type);
      if (filter) params.set('filter', filter);
      if (width) params.set('width', width);
      if (noCache) params.set('_t', Date.now());

      const qs = params.toString();
      if (qs) url += '?' + qs;

      return url;
    }

    // === FUNCIÓN setImageState() ===
    function setImageState(mode) {
      placeholder.style.display = 'none';
      memeImage.style.display = 'none';
      spinner.style.display = 'none';
      errorState.style.display = 'none';

      if (mode === 'loading') spinner.style.display = 'block';
      else if (mode === 'error') errorState.style.display = 'block';
      else if (mode === 'empty') placeholder.style.display = 'block';
      else if (mode === 'image') memeImage.style.display = 'block';
    }

    // === FUNCIÓN generateMeme() ===
    function generateMeme(noCache) {
      if (state.isGenerating) return;
      state.isGenerating = true;
      btnGenerate.disabled = true;

      setImageState('loading');

      const url = buildUrl({
        text: state.text,
        tags: state.tags,
        fontSize: state.fontSize,
        fontColor: state.fontColor,
        type: state.type,
        filter: state.filter,
        width: state.width,
        noCache,
      });

      state.currentUrl = url;
      urlDisplay.textContent = url;

      const img = new Image();
      img.onload = function () {
        memeImage.src = url;
        setImageState('image');
        state.isGenerating = false;
        btnGenerate.disabled = false;
        addToGallery(url);
      };
      img.onerror = function () {
        setImageState('error');
        state.isGenerating = false;
        btnGenerate.disabled = false;
      };
      img.src = url;
    }

    // === FUNCIÓN loadNewCat() ===
    function loadNewCat() {
      generateMeme(true);
    }

    // === FUNCIÓN surpriseMe() ===
    function surpriseMe() {
      const randomText = SURPRISE_PHRASES[Math.floor(Math.random() * SURPRISE_PHRASES.length)];
      const randomTag = TAGS[Math.floor(Math.random() * TAGS.length)];
      const randomFilter = ['', 'blur', 'mono', 'negate'][Math.floor(Math.random() * 4)];
      const randomColor = ['#ffffff', '#ff6f00', '#e040fb', '#4caf50', '#f44336', '#2196f3'][Math.floor(Math.random() * 6)];
      const randomFontSize = Math.floor(Math.random() * 41) + 20;

      textInput.value = randomText;
      state.text = randomText;
      state.tags = [randomTag];
      state.filter = randomFilter;
      state.fontColor = randomColor;
      state.fontSize = randomFontSize;
      state.type = '';

      fontColorInput.value = randomColor;
      fontSizeSlider.value = randomFontSize;
      fontSizeValue.textContent = randomFontSize;
      imageFilter.value = randomFilter;
      imageType.value = '';

      if (randomTag === 'gif') {
        state.hasGifTag = true;
      } else {
        state.hasGifTag = false;
      }

      updateTagChips();
      generateMeme(false);
    }

    // === FUNCIÓN downloadMeme() ===
    async function downloadMeme() {
      if (!state.currentUrl) return;
      try {
        const response = await fetch(state.currentUrl);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = 'cat-meme-' + Date.now() + '.jpg';
        a.click();
        URL.revokeObjectURL(blobUrl);
      } catch (err) {
        window.open(state.currentUrl, '_blank');
      }
    }

    // === FUNCIÓN copyUrl() ===
    function copyUrl() {
      if (!state.currentUrl) return;
      navigator.clipboard.writeText(state.currentUrl).then(() => {
        copyFeedback.textContent = '✓ ¡Copiado!';
        copyFeedback.className = 'feedback-copied';
        copyFeedback.style.display = 'inline';
        setTimeout(() => { copyFeedback.style.display = 'none'; }, 2000);
      }).catch(() => {
        copyFeedback.textContent = 'Error al copiar';
        copyFeedback.style.display = 'inline';
        setTimeout(() => { copyFeedback.style.display = 'none'; }, 2000);
      });
    }

    // === FUNCIÓN addToGallery() ===
    function addToGallery(url) {
      state.gallery.unshift(url);
      if (state.gallery.length > 6) state.gallery.pop();
      renderGallery();
    }

    // === FUNCIÓN renderGallery() ===
    function renderGallery() {
      if (state.gallery.length === 0) {
        galleryGrid.innerHTML = '<div class="gallery-empty">Aún no hay memes generados.</div>';
        return;
      }
      galleryGrid.innerHTML = state.gallery.map(url => `
        <div class="gallery-item">
          <img src="${url}" alt="Meme thumbnail" loading="lazy">
          <div class="overlay">
            <button class="btn btn-small btn-primary" data-reload="${url}">🔄 Recargar</button>
          </div>
        </div>
      `).join('');

      galleryGrid.querySelectorAll('[data-reload]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const url = btn.dataset.reload;
          state.currentUrl = url;
          memeImage.src = url;
          setImageState('image');
          urlDisplay.textContent = url;
        });
      });
    }

    // === FUNCIÓN clearGallery() ===
    function clearGallery() {
      state.gallery = [];
      renderGallery();
    }

    // === TAG CHIPS ===
    function updateTagChips() {
      tagsContainer.querySelectorAll('.tag-chip').forEach(chip => {
        const tag = chip.dataset.tag;
        chip.classList.toggle('active', state.tags.includes(tag));
      });
      state.hasGifTag = state.tags.includes('gif');
    }

    function toggleTag(tag) {
      const idx = state.tags.indexOf(tag);
      if (idx > -1) {
        state.tags.splice(idx, 1);
      } else {
        if (state.tags.length >= 2) {
          state.tags.shift();
        }
        state.tags.push(tag);
      }
      updateTagChips();
    }

    function initTags() {
      TAGS.forEach(tag => {
        const chip = document.createElement('button');
        chip.className = 'tag-chip';
        chip.dataset.tag = tag;
        chip.textContent = tag;
        chip.addEventListener('click', () => toggleTag(tag));
        tagsContainer.appendChild(chip);
      });
      updateTagChips();
    }

    // === FUNCIÓN readOptionsFromUI() ===
    function readOptionsFromUI() {
      state.text = textInput.value;
      state.fontSize = parseInt(fontSizeSlider.value, 10);
      state.fontColor = fontColorInput.value;
      state.type = imageType.value;
      state.filter = imageFilter.value;
      state.width = imageWidth.value;
    }

    // === EVENT LISTENERS ===
    btnGenerate.addEventListener('click', () => {
      readOptionsFromUI();
      generateMeme(false);
    });

    btnNewCat.addEventListener('click', () => {
      readOptionsFromUI();
      loadNewCat();
    });

    btnSurprise.addEventListener('click', surpriseMe);

    btnCopyUrl.addEventListener('click', copyUrl);

    btnDownload.addEventListener('click', downloadMeme);

    btnClearGallery.addEventListener('click', clearGallery);

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        readOptionsFromUI();
        generateMeme(false);
      }
    });

    fontSizeSlider.addEventListener('input', () => {
      fontSizeValue.textContent = fontSizeSlider.value;
    });

    // === INICIALIZACIÓN ===
    initTags();

    // Generar meme inicial
    textInput.value = 'Hello, Internet';
    state.text = 'Hello, Internet';
    state.tags = ['cute'];
    updateTagChips();
    generateMeme(false);
  </script>
</body>
</html>
